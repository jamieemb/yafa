# Self-contained compose — builds from this checkout's Dockerfile and
# runs against a Docker-managed named volume.
#
#   docker compose up -d --build
#
# To pull a published image instead of building, set YAFA_IMAGE to the
# registry tag, e.g. `YAFA_IMAGE=ghcr.io/jamieemb/yafa:latest`.

services:
  yafa:
    build:
      context: .
    image: ${YAFA_IMAGE:-yafa:local}
    container_name: yafa
    restart: unless-stopped
    ports:
      # host:container — change the host side if 3000 is taken
      - "3000:3000"
    volumes:
      - yafa-data:/data
    environment:
      DATABASE_URL: file:/data/yafa.db
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  yafa-data:
